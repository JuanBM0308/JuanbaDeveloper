<section>
  <h1>Contact.</h1>
  <div id="containerContactForm">
    <form id="contactForm" [formGroup]="contactForm" (ngSubmit)="onSubmit()">
      
      <div class="mb-3">
        <label for="emailUser" class="form-label">Email address</label>
        <input type="email" name="email" class="form-control" id="emailUser" formControlName="email"> 
        <div *ngIf="email?.invalid && (email?.dirty || email?.touched)" class="text-danger">
          <small *ngIf="email?.hasError('required')">This field is required.</small>
          <small *ngIf="email?.hasError('email')">Please enter a valid email address.</small>
          <small *ngIf="email?.hasError('maxlength')">Max 30 characters.</small>
        </div>
      </div>

      <div class="mb-3">
        <label for="nameUser" class="form-label">Name</label>
        <input type="text" name="name" class="form-control" id="nameUser" formControlName="name">
        <div *ngIf="name?.invalid && (name?.dirty || name?.touched)" class="text-danger">
          <small *ngIf="name?.hasError('required')">This field is required.</small>
        </div>
      </div>

      <div class="mb-3">
        <label for="messageUser" class="form-label">Message</label>
        <textarea name="message" class="form-control" id="messageUser" formControlName="message" rows="4"></textarea>
        <div *ngIf="message?.invalid && (message?.dirty || message?.touched)" class="text-danger">
          <small *ngIf="message?.hasError('required')">This field is required.</small>
          <small *ngIf="message?.hasError('maxlength')">Maximum 500 characters.</small>
        </div>
      </div>

      <button id="submitButton" type="submit" class="btn" [disabled]="contactForm.invalid">
        Submit
      </button>
    </form>
  </div>
</section>
